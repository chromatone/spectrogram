<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Chromatone Spectrogram V2</title>
  <meta name="theme-color" content="black">
  <meta name="application-name" content="Spectrogram V2">
  <meta name="description" content="12-TET audio analysis with zero dependencies">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      background-color: black;
      width: 100%;
      min-width: 320px;
      min-height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    #screen {
      width: 100%;
      height: 100%;
      cursor: none;
    }

    #spectrogram {
      max-width: 100%;
    }

    .controls {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(10px);
      padding: 10px;
      border-radius: 10px;
      color: white;
      max-height: 100vh;
      overflow-y: auto;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .control-item {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .control-item label {
      font-size: 12px;
      opacity: 0.7;
    }

    .control-item input[type="range"] {
      width: 100px;
    }

    .start-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
      color: white;
      gap: 20px;
    }

    .start-screen h1 {
      font-size: 48px;
    }

    .start-screen button {
      font-size: 24px;
      padding: 20px 40px;
      border: 2px solid white;
      background: transparent;
      color: white;
      cursor: pointer;
      border-radius: 10px;
    }

    .start-screen button:hover {
      background: white;
      color: black;
    }
  </style>
</head>

<body>
  <div id="start-screen" class="start-screen">
    <h1>Chromatone Spectrogram V2</h1>
    <p>12-TET audio analysis with zero dependencies</p>
    <button id="start-btn">START</button>
  </div>

  <div id="screen" style="display: none;">
    <canvas id="spectrogram"></canvas>
  </div>

  <div id="controls" class="controls" style="display: none;">
    <div class="control-group">
      <div class="control-item">
        <label>Sub-bands per semitone (odd: 3, 5, 7...)</label>
        <input type="range" id="sub-bands" min="3" max="9" step="2" value="5">
        <span id="sub-bands-val">5</span>
      </div>
      <div class="control-item">
        <label>FFT Size (power of 2)</label>
        <input type="range" id="fft-size" min="10" max="14" step="1" value="13">
        <span id="fft-size-val">8192</span>
      </div>
      <div class="control-item">
        <label>Smoothing</label>
        <input type="range" id="smoothing" min="0" max="1" step="0.01" value="0.5">
        <span id="smoothing-val">0.5</span>
      </div>
      <div class="control-item">
        <label>Scroll Speed</label>
        <input type="range" id="speed" min="1" max="4" step="1" value="2">
        <span id="speed-val">2</span>
      </div>
      <div class="control-item">
        <label>Auto Exposure</label>
        <input type="checkbox" id="auto-exposure" checked>
      </div>
      <div class="control-item">
        <label>Manual Gain (ISO)</label>
        <input type="range" id="gain" min="0" max="2" step="0.1" value="1">
        <span id="gain-val">1</span>
      </div>
      <div class="control-item">
        <label>Vertical Mode</label>
        <input type="checkbox" id="vertical">
      </div>
      <div class="control-item">
        <button id="clear-btn">Clear Canvas</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { useSpectrogramV2 } from './composables/useSpectrogramV2.js'

    const startBtn = document.getElementById('start-btn')
    const startScreen = document.getElementById('start-screen')
    const screen = document.getElementById('screen')
    const controls = document.getElementById('controls')

    const {
      initiate,
      clear,
      params,
      controls: ctrl
    } = useSpectrogramV2()

    startBtn.addEventListener('click', () => {
      initiate()
      startScreen.style.display = 'none'
      screen.style.display = 'block'
      controls.style.display = 'block'
    })

    document.getElementById('clear-btn').addEventListener('click', clear)

    // Bind controls
    const bindControl = (id, param, displayId, transform = v => v) => {
      const input = document.getElementById(id)
      const display = document.getElementById(displayId)
      input.addEventListener('input', (e) => {
        const val = transform(parseFloat(e.target.value))
        ctrl[param] = val
        if (display) display.textContent = val
      })
    }

    bindControl('sub-bands', 'subBands', 'sub-bands-val', v => Math.round(v))
    bindControl('fft-size', 'fftSize', 'fft-size-val', v => Math.pow(2, v))
    bindControl('smoothing', 'smoothing', 'smoothing-val')
    bindControl('speed', 'speed', 'speed-val', v => Math.round(v))
    bindControl('gain', 'gain', 'gain-val')

    document.getElementById('auto-exposure').addEventListener('change', (e) => {
      ctrl.autoExposure = e.target.checked
    })

    document.getElementById('vertical').addEventListener('change', (e) => {
      ctrl.vertical = e.target.checked
    })
  </script>
</body>

</html>
